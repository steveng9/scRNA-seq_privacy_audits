# Primary conda environment for the PPML-Huskies CAMDA Track II submission.
# Covers all three SDG generators (scdesign2_dp, zinbwave) and the
# scMAMA-MIA attack.
#
# Note: the scvi generator requires a SEPARATE environment (environment_scvi.yaml).
#
# Create this environment:
#   conda env create -f environment.yaml
#   conda activate ppml-camda-env
#
# After creating the environment, install required R packages:
#   conda run -n ppml-camda-env Rscript install_r_packages.r
#   (or activate the env first, then: Rscript install_r_packages.r)

name: ppml-camda-env
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.9
  - r-base=4.3.1         # R is required for scDesign2 and ZINBWave
  - numpy=1.23.5
  - scipy=1.13.1
  - pandas>=2.0
  - scikit-learn>=1.3
  - h5py>=3.9
  - tqdm>=4.66
  - hdf5>=1.12
  - pip>=24.0

  - pip:
      - rpy2==3.6.4          # Python ↔ R bridge (must match R version above)
      - rpy2-rinterface==3.6.3
      - rpy2-robjects==3.6.3
      - anndata==0.10.9
      - scanpy==1.10.3
      - pyreadr==0.5.4       # read .rds files in Python
      - python-box==7.3.2    # dict-as-object config access
      - PyYAML>=6.0
      - leidenalg>=0.10
      - louvain>=0.8
