# DIRECTORY STRUCTURE (~/data/scMAMAMIA/):
#
#   {dataset}/                          # ok, aida, cg
#     full_dataset_cleaned.h5ad         # canonical source data
#     hvg.csv  /  hvg_full.csv          # shared HVG masks
#     splits/{nd}d/{trial}/             # donor ID arrays — single source of truth
#       train.npy                       # shared across ALL SDG variants
#       holdout.npy
#       auxiliary.npy
#     scdesign2/
#       no_dp/{nd}d/{trial}/
#       eps_{e}/{nd}d/{trial}/
#     scdesign3/
#       gaussian/{nd}d/{trial}/
#       vine/{nd}d/{trial}/
#     scvi/no_dp/{nd}d/{trial}/
#     scdiffusion/no_dp/{nd}d/{trial}/
#     nmf/
#       no_dp/{nd}d/{trial}/
#       eps_{e}/{nd}d/{trial}/
#
#   Each SDG trial dir contains:
#     datasets/synthetic.h5ad
#     artifacts/
#       synth/   — shadow-model copulas fitted to synthetic data
#       aux/     — shadow-model copulas fitted to auxiliary data
#     models/    — white-box copulas (scDesign2 training artifacts)
#     results/
#       mamamia_results.csv
#       mamamia_all_scores.csv
#       quality_results.json
#       figures/

dir_list:
  local:
    home: /Users/stevengolob/PycharmProjects/camda_hpc
    data: /Users/stevengolob/Documents/school/PhD/Ghent_project_mia_scRNAseq/data
  server:
    home: /home/golobs/scRNA-seq_privacy_audits
    data: /home/golobs/data
dataset_name: ok
plot_results: true
parallelize: true
min_aux_donors: 5

mamamia_params:
  IMPORTANCE_OF_CLASS_B_FPs: .17
  epsilon: .0001
  mahalanobis: true
  uniform_remapping_fn: zinb_cdf
  lin_alg_inverse_fn: pinv_gpu
  closeness_to_correlation_fn: closeness_to_correlation_1
  class_b_gene_set: secondary
  class_b_scoring: llr
  class_b_gamma: auto

mia_setting:
  sample_donors_strategy_fn: sample_donors_strategy_2
  num_donors: 100
  # threat model
  white_box: false
  use_wb_hvgs: true
  use_aux: true
